name: CI / Matrix Build & Publish Docker

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  pull_request: {}

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build ${{ github.event_name != 'pull_request' && '& Publish' || '' }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
          - arch: armv7
            platform: linux/arm/v7

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image name & tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # for git tags (v1.2.3 -> "1.2.3")
            type=ref,event=push,match=tags,replacement=${GITHUB_REF_NAME}
            # latest on master branch
            type=ref,event=push,branch=master,value=latest
            # branch names (except master)
            type=ref,event=push,except=tags
            # for pull requests: pr-<run_id>
            type=raw,event=pull_request,value=pr-${{ github.run_id }}
            # commit SHA tag
            type=sha
          # optional: set Docker labels
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build ${{ github.event_name != 'pull_request' && '& push' || '' }} ${{ matrix.arch }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: ${{ matrix.platform }}
          # metadata-action will output a space-separated list of fully-qualified tags
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
