name: CD - Build and publish Docker image

# Runs only on direct pushes to master (merged PRs) and semver release tags.
# These events always use the repository's own GITHUB_TOKEN which has
# packages:write permission, so pushing to ghcr.io is guaranteed to work.
#
# amd64 and arm64 are built in parallel on native runners (no QEMU).
# arm/v7 runs on the arm64 runner with lightweight QEMU emulation.
# Each arch pushes by digest only; the merge job assembles the named tags
# using 'docker buildx imagetools create' - no image rebuild.

on:
  push:
    branches: [ "master" ]
    tags: [ "v*.*.*" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. Build each architecture in parallel
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            platform_pair: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform_pair: linux-arm64
          - platform: linux/arm/v7
            runner: ubuntu-24.04-arm
            platform_pair: linux-arm-v7

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # github.repository preserves original casing but Docker refs must be lowercase.
      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV
        env:
          IMAGE_NAME: ${{ github.repository }}

      # QEMU is required for arm/v7 (no native runner exists).
      # It is a no-op on the native amd64 and arm64 jobs.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Push by digest only (no named tag yet) so no partial manifest is ever
      # publicly visible under a real tag while the sibling arch is still building.
      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=${{ matrix.platform_pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform_pair }}

      # Save the digest to a file so the merge job can pick it up via artifact.
      # (Matrix job outputs only capture the last job's value, so artifacts are
      # the reliable way to pass multiple digests downstream.)
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # 2. Merge digests into a single multi-arch manifest
  merge:
    name: Merge and tag manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    outputs:
      digest: ${{ steps.inspect.outputs.digest }}
      image: ${{ steps.inspect.outputs.image }}

    steps:
      - name: Download all digest artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # github.repository preserves original casing but Docker refs must be lowercase.
      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV
        env:
          IMAGE_NAME: ${{ github.repository }}

      # Derive the final named tags and OCI labels from Git metadata.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Assemble the named multi-arch manifest from the per-arch digests.
      # 'imagetools create' only rewrites registry metadata — no rebuild.
      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      # Inspect the manifest to retrieve its digest for the signing step.
      - name: Inspect manifest and capture digest
        id: inspect
        run: |
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
          digest=$(docker buildx imagetools inspect --format '{{json .Manifest}}' "$image" | jq -r '.digest')
          echo "digest=$digest" >> $GITHUB_OUTPUT
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT
          docker buildx imagetools inspect "$image"

  # 3. Sign the final manifest
  sign:
    name: Sign published image
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      packages: write
      id-token: write   # required for keyless cosign signing

    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Sign the manifest by digest, covers all tags pointing to it.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        run: cosign sign --yes "${{ needs.merge.outputs.image }}@${{ needs.merge.outputs.digest }}"
